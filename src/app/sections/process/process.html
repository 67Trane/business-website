<!-- Process Section -->
<section id="ablauf" class="border-y border-white/5 bg-white/2 py-24 sm:py-32">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <app-section-heading
      eyebrow="Ablauf"
      title="So arbeiten wir zusammen"
      description="Ein klarer Prozess in vier Schritten – damit Sie jederzeit wissen, wo Ihr Projekt steht."
    />

    <!-- Process Steps -->
    <ol class="mt-16 grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
      @for (step of steps; track step.title) {
        <li
          class="relative rounded-2xl border border-white/10 bg-slate-950/60 p-8 transition-colors duration-300 hover:border-white/25"
        >
          <!-- Step number -->
          <span
            class="bg-linear-to-r from-cyan-400 to-indigo-400 bg-clip-text font-mono text-4xl font-bold text-transparent"
          >
            0{{ $index + 1 }}
          </span>
          <h3 class="mt-5 text-lg font-semibold text-white">{{ step.title }}</h3>
          <p class="mt-3 text-sm leading-relaxed text-slate-400">{{ step.description }}</p>
        </li>
      }
    </ol>

    <!-- Process CTA -->
    <div class="mt-14 text-center">
      <a
        href="#kontakt"
        class="inline-flex rounded-full bg-linear-to-r from-cyan-500 to-indigo-500 px-7 py-3 text-sm font-semibold text-white shadow-lg shadow-cyan-500/20 transition hover:shadow-cyan-500/40 hover:brightness-110"
      >
        Kostenloses Erstgespräch vereinbaren
      </a>
    </div>
  </div>
</section>
