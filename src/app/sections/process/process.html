<section id="ablauf" class="bg-canvas">
  <div class="site-shell">
    <app-section-heading
      data-reveal
      [eyebrow]="content().process.label"
      [title]="content().process.heading"
      [description]="content().process.sub"
    />

    <ol data-reveal class="mt-14 grid overflow-hidden rounded-2xl border border-brand/10 bg-brand/10 sm:grid-cols-2 lg:grid-cols-4">
      @for (step of content().process.items; track step.title) {
        <li class="border-brand/10 bg-canvas p-8 sm:border-r last:border-r-0">
          <span class="font-serif text-5xl italic text-brand/20" aria-hidden="true">0{{ $index + 1 }}</span>
          <h3 class="mt-5 font-serif text-xl font-semibold text-ink">{{ step.title }}</h3>
          <p class="mt-3 text-sm leading-relaxed text-copy">{{ step.description }}</p>
        </li>
      }
    </ol>
  </div>
</section>
