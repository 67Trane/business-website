<!-- References Section -->
<section id="referenzen" class="py-24 sm:py-32">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <app-section-heading
      eyebrow="Referenzen"
      title="Ausgewählte Projekte"
      description="Ein Einblick in meine Arbeit – von der Web-Anwendung bis zur kompletten Plattform mit eigenem Backend."
    />

    <!-- Projects Grid -->
    <div class="mt-16 grid gap-6 md:grid-cols-2">
      @for (project of projects; track project.title) {
        <app-project-card [project]="project" />
      }
    </div>

    <!-- GitHub CTA -->
    <p class="mt-12 text-center text-sm text-slate-500">
      Weitere Projekte und Code-Beispiele finden Sie auf
      <a
        [href]="profile.githubUrl"
        target="_blank"
        rel="noopener"
        class="font-medium text-cyan-400 transition-colors hover:text-cyan-300"
      >
        GitHub →
      </a>
    </p>
  </div>
</section>
