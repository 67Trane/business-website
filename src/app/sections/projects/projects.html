<section id="referenzen" class="bg-ink text-[#d8def0]">
  <div class="site-shell">
    <div data-reveal class="flex flex-wrap items-end justify-between gap-6">
      <div>
        <span class="eyebrow text-[#6b96f5]!">{{ content().projects.label }}</span>
        <h2 class="display-title mt-3 text-[#eef1fb]!">
          {{ content().projects.heading }}
        </h2>
      </div>
      <a
        [href]="profile.githubUrl"
        target="_blank"
        rel="noopener"
        class="border-b border-[#6b96f5]/30 pb-1 font-mono text-xs text-[#6b96f5] hover:text-white"
      >
        {{ content().projects.github }} ↗
      </a>
    </div>

    <div data-reveal class="mt-12 grid gap-4 md:grid-cols-2">
      @for (project of projects(); track project.title) {
        <app-project-card [project]="project" />
      }
    </div>
  </div>
</section>
