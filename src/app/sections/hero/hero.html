<!-- Hero Section -->
<section id="top" class="relative min-h-screen overflow-hidden bg-canvas">
  <!-- Parallax color blobs: each layer scrolls at its own speed for depth -->
  <div
    class="pointer-events-none absolute -top-36 -right-28 size-155 rounded-full bg-[radial-gradient(circle,rgb(30_82_204/20%),transparent_68%)] will-change-transform"
    [style.transform]="blueBlobShift()"
    aria-hidden="true"
  ></div>
  <div
    class="pointer-events-none absolute right-[12%] -bottom-28 size-130 rounded-full bg-[radial-gradient(circle,rgb(244_150_98/22%),transparent_68%)] will-change-transform"
    [style.transform]="peachBlobShift()"
    aria-hidden="true"
  ></div>
  <div
    class="pointer-events-none absolute top-[28%] right-[25%] size-95 rounded-full bg-[radial-gradient(circle,rgb(92_178_235/20%),transparent_68%)] will-change-transform"
    [style.transform]="cyanBlobShift()"
    aria-hidden="true"
  ></div>

  <div class="relative grid min-h-screen lg:grid-cols-[48%_52%]">
    <!-- Photo column: oversized parallax layer inside a clipping grid cell -->
    <div class="relative min-h-[54vh] overflow-hidden lg:min-h-screen">
      <div
        class="absolute inset-x-0 top-0 h-[125%] bg-linear-to-b from-[#dfe5f6] to-[#cbd6f2] will-change-transform"
        [style.transform]="portraitShift()"
      >
        <!-- Blue glow behind the person -->
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_70%_55%_at_50%_38%,rgb(30_82_204/34%),transparent_70%)]"></div>
        <!-- Portrait, fading out softly towards the left edge -->
        <div class="absolute inset-x-0 top-20 h-[78%]">
          <img
            ngSrc="images/profile.webp"
            fill
            priority
            class="object-contain object-bottom mask-[linear-gradient(to_right,transparent_0%,black_14%,black_100%)]"
            alt="Mehmet Deliaci"
          />
        </div>
        <!-- Soft blur running out over the left photo edge -->
        <div
          class="absolute top-20 left-0 h-[78%] w-28 backdrop-blur-[9px] mask-[linear-gradient(to_right,black_0%,black_30%,transparent_100%)]"
        ></div>
        <!-- Blend right and bottom edges into the canvas background -->
        <div class="absolute inset-y-0 right-0 w-40 bg-linear-to-r from-transparent to-canvas"></div>
        <div class="absolute inset-x-0 bottom-0 h-44 bg-linear-to-b from-transparent to-canvas"></div>
      </div>
    </div>

    <!-- Copy column -->
    <div class="relative z-10 flex flex-col justify-center px-6 pt-8 pb-16 sm:px-12 lg:px-[clamp(2.25rem,5vw,5rem)] lg:pt-28">
      <span class="animate-fade-up inline-flex w-fit items-center gap-2.5 rounded-full border border-brand/20 bg-brand/8 px-3.5 py-2 font-mono text-xs font-medium text-brand">
        <span class="relative flex size-2">
          <span class="absolute inline-flex size-full animate-ping rounded-full bg-brand opacity-50"></span>
          <span class="relative inline-flex size-2 rounded-full bg-brand"></span>
        </span>
        {{ content().hero.available }}
      </span>

      <h1 class="animate-fade-up mt-6 max-w-[12em] font-serif text-[clamp(2.5rem,5vw,3.875rem)] leading-[1.04] font-medium tracking-[-0.03em] text-ink [animation-delay:100ms]">
        {{ content().hero.main }}
        <span class="italic text-brand">{{ content().hero.accent }}</span>
      </h1>

      <p class="animate-fade-up mt-6 max-w-124 text-[clamp(1rem,1.3vw,1.125rem)] leading-relaxed text-copy [animation-delay:200ms]">
        {{ content().hero.sub }}
      </p>

      <div class="animate-fade-up mt-9 flex flex-wrap gap-3.5 [animation-delay:300ms]">
        <a href="#kontakt" class="primary-button">{{ content().hero.primary }} <span>→</span></a>
        <a
          href="#referenzen"
          class="inline-flex items-center justify-center rounded-lg border border-ink/20 px-6 py-3.5 text-md font-semibold text-ink transition hover:border-brand hover:text-brand"
        >
          {{ content().hero.secondary }}
        </a>
      </div>

      <ul class="animate-fade-up mt-11 flex max-w-2xl flex-wrap gap-x-7 gap-y-3 border-t border-ink/10 pt-7 [animation-delay:400ms]">
        @for (point of content().hero.trust; track point) {
          <li class="flex max-w-56 items-start gap-2 text-sm leading-snug font-medium text-copy">
            <span class="mt-1.5 size-1.5 shrink-0 rounded-full bg-brand"></span>
            {{ point }}
          </li>
        }
      </ul>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div
    class="pointer-events-none absolute bottom-9 left-[47%] hidden -translate-x-1/2 flex-col items-center gap-2.5 lg:flex"
    aria-hidden="true"
  >
    <span class="font-mono text-[10.5px] tracking-[0.18em] text-copy/50 uppercase">scroll</span>
    <div class="scroll-line h-9 w-px bg-brand opacity-50"></div>
  </div>
</section>
