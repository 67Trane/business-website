<!-- Contact Section -->
<section id="kontakt" class="py-24 sm:py-32">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <app-section-heading
      eyebrow="Kontakt"
      title="Lassen Sie uns über Ihr Projekt sprechen"
      description="Schildern Sie mir kurz Ihr Vorhaben – Sie erhalten in der Regel innerhalb von 24 Stunden eine Antwort."
    />

    <div class="mt-16 grid gap-12 lg:grid-cols-2">
      <!-- Contact info -->
      <div>
        <h3 class="text-xl font-semibold text-white">Direkter Draht</h3>
        <p class="mt-3 leading-relaxed text-slate-400">
          Ob konkretes Projekt oder erste Idee: Das Erstgespräch ist kostenlos und unverbindlich.
          Danach wissen Sie, was möglich ist – und was es kostet.
        </p>

        <!-- Email card -->
        <a
          [href]="'mailto:' + profile.email"
          class="mt-8 flex items-center gap-4 rounded-2xl border border-white/10 bg-white/3 p-5 transition-colors hover:border-cyan-400/40 hover:bg-white/5"
        >
          <span
            class="flex size-11 items-center justify-center rounded-xl bg-cyan-400/10 text-cyan-400"
          >
            <app-icon name="mail" class="size-5" />
          </span>
          <span>
            <span class="block text-sm text-slate-500">E-Mail</span>
            <span class="block font-medium text-white">{{ profile.email }}</span>
          </span>
        </a>

        <!-- Social links -->
        <ul class="mt-8 flex items-center gap-4">
          @for (link of socialLinks; track link.name) {
            <li>
              <a
                [href]="link.url"
                [attr.aria-label]="link.name"
                target="_blank"
                rel="noopener"
                class="flex size-11 items-center justify-center rounded-xl border border-white/10 bg-white/5 text-slate-400 transition-colors hover:border-white/25 hover:text-white"
              >
                <app-icon [name]="link.icon" class="size-5" />
              </a>
            </li>
          }
        </ul>
      </div>

      <!-- Inquiry form -->
      <form class="rounded-2xl border border-white/10 bg-white/3 p-8" (submit)="onSubmit($event)">
        <div class="grid gap-6 sm:grid-cols-2">
          <div>
            <label for="name" class="block text-sm font-medium text-slate-300">Name</label>
            <input
              id="name"
              name="name"
              type="text"
              required
              autocomplete="name"
              placeholder="Ihr Name"
              class="mt-2 w-full rounded-lg border border-white/10 bg-slate-950/60 px-4 py-2.5 text-white placeholder:text-slate-600 focus:border-cyan-400/60 focus:ring-2 focus:ring-cyan-400/20 focus:outline-none"
            />
          </div>
          <div>
            <label for="email" class="block text-sm font-medium text-slate-300">E-Mail</label>
            <input
              id="email"
              name="email"
              type="email"
              required
              autocomplete="email"
              placeholder="sie@unternehmen.de"
              class="mt-2 w-full rounded-lg border border-white/10 bg-slate-950/60 px-4 py-2.5 text-white placeholder:text-slate-600 focus:border-cyan-400/60 focus:ring-2 focus:ring-cyan-400/20 focus:outline-none"
            />
          </div>
          <div class="sm:col-span-2">
            <label for="company" class="block text-sm font-medium text-slate-300">
              Unternehmen <span class="text-slate-600">(optional)</span>
            </label>
            <input
              id="company"
              name="company"
              type="text"
              autocomplete="organization"
              placeholder="Ihr Unternehmen"
              class="mt-2 w-full rounded-lg border border-white/10 bg-slate-950/60 px-4 py-2.5 text-white placeholder:text-slate-600 focus:border-cyan-400/60 focus:ring-2 focus:ring-cyan-400/20 focus:outline-none"
            />
          </div>
          <div class="sm:col-span-2">
            <label for="message" class="block text-sm font-medium text-slate-300">
              Ihr Projekt
            </label>
            <textarea
              id="message"
              name="message"
              rows="5"
              required
              placeholder="Worum geht es? Ein paar Sätze genügen."
              class="mt-2 w-full resize-none rounded-lg border border-white/10 bg-slate-950/60 px-4 py-2.5 text-white placeholder:text-slate-600 focus:border-cyan-400/60 focus:ring-2 focus:ring-cyan-400/20 focus:outline-none"
            ></textarea>
          </div>
        </div>
        <button
          type="submit"
          class="mt-8 w-full rounded-full bg-linear-to-r from-cyan-500 to-indigo-500 px-7 py-3 text-sm font-semibold text-white shadow-lg shadow-cyan-500/20 transition hover:shadow-cyan-500/40 hover:brightness-110"
        >
          Anfrage senden
        </button>
        <p class="mt-4 text-center text-xs text-slate-600">
          Kostenloses Erstgespräch · 100 % unverbindlich
        </p>
      </form>
    </div>
  </div>
</section>
