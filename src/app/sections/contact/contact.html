<section id="kontakt" class="border-t border-brand/10 bg-canvas">
  <div class="site-shell grid items-start gap-12 lg:grid-cols-[1fr_1.1fr] lg:gap-18">
    <div data-reveal>
      <app-section-heading
        [eyebrow]="content().contact.label"
        [title]="content().contact.heading"
        [description]="content().contact.sub"
      />

      <p class="micro-label mt-9">
        {{ content().contact.direct }}
      </p>
      <a
        [href]="'mailto:' + profile.email"
        class="mt-2 inline-block border-b-2 border-ink/20 pb-1 font-serif text-[clamp(1.25rem,2.5vw,1.5rem)] text-ink hover:border-brand hover:text-brand"
      >
        {{ profile.email }}
      </a>

      <ul class="mt-7 flex flex-wrap gap-2.5">
        @for (link of socialLinks; track link.name) {
          <li>
            <a
              [href]="link.url"
              target="_blank"
              rel="noopener"
              class="inline-flex items-center gap-2 rounded-lg border border-ink/15 bg-white px-4 py-2.5 text-sm font-semibold text-ink hover:border-brand hover:text-brand"
            >
              <app-icon [name]="link.icon" class="size-4" />
              {{ link.name }}
            </a>
          </li>
        }
      </ul>
    </div>

    <form data-reveal class="rounded-[20px] border border-brand/10 bg-white p-6 shadow-[0_24px_52px_-32px_rgb(30_82_204/22%)] sm:p-9" (submit)="onSubmit($event)">
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="flex flex-col gap-2 text-xs font-bold tracking-wide text-copy uppercase">
          {{ content().contact.name }}
          <input name="name" type="text" required autocomplete="name" [placeholder]="content().contact.namePlaceholder" class="rounded-lg border-2 border-transparent bg-canvas px-4 py-3 text-base font-normal text-ink normal-case placeholder:text-copy/50 focus:border-brand/35 focus:outline-none" />
        </label>
        <label class="flex flex-col gap-2 text-xs font-bold tracking-wide text-copy uppercase">
          E-Mail
          <input name="email" type="email" required autocomplete="email" [placeholder]="content().contact.emailPlaceholder" class="rounded-lg border-2 border-transparent bg-canvas px-4 py-3 text-base font-normal text-ink normal-case placeholder:text-copy/50 focus:border-brand/35 focus:outline-none" />
        </label>
      </div>
      <label class="mt-4 flex flex-col gap-2 text-xs font-bold tracking-wide text-copy uppercase">
        {{ content().contact.company }}
        <input name="company" type="text" autocomplete="organization" [placeholder]="content().contact.companyPlaceholder" class="rounded-lg border-2 border-transparent bg-canvas px-4 py-3 text-base font-normal text-ink normal-case placeholder:text-copy/50 focus:border-brand/35 focus:outline-none" />
      </label>
      <label class="mt-4 flex flex-col gap-2 text-xs font-bold tracking-wide text-copy uppercase">
        {{ content().contact.project }}
        <textarea name="message" rows="5" required [placeholder]="content().contact.projectPlaceholder" class="resize-y rounded-lg border-2 border-transparent bg-canvas px-4 py-3 text-base font-normal text-ink normal-case placeholder:text-copy/50 focus:border-brand/35 focus:outline-none"></textarea>
      </label>
      <button type="submit" class="primary-button mt-5 w-full">{{ content().contact.send }}</button>
      <p class="mt-3 text-center font-mono text-xs text-[#8a9ac4]">
        {{ content().contact.note }}
      </p>
    </form>
  </div>
</section>
