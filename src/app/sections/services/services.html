<section id="leistungen" class="bg-white">
  <div class="site-shell">
    <div data-reveal class="grid items-end gap-8 md:grid-cols-[1fr_1.7fr] md:gap-12">
      <app-section-heading
        [eyebrow]="content().services.label"
        [title]="content().services.heading"
      />
      <p class="max-w-140 text-lead text-copy">
        {{ content().services.sub }}
      </p>
    </div>

    <div data-reveal class="mt-14 border-b border-ink/10">
      @for (service of content().services.items; track service.title) {
        <article class="group grid gap-5 border-t border-ink/10 px-1 py-7 transition-colors hover:bg-brand/4 sm:grid-cols-[3.5rem_15rem_1fr] sm:px-4">
          <span class="font-serif text-2xl italic text-brand/30">0{{ $index + 1 }}</span>
          <div>
            <h3 class="font-serif text-xl font-semibold leading-tight text-ink">{{ service.title }}</h3>
            <ul class="mt-3 space-y-1">
              @for (point of service.points; track point) {
                <li class="font-mono text-xs text-brand">{{ point }}</li>
              }
            </ul>
          </div>
          <p class="max-w-152 text-md text-copy">{{ service.description }}</p>
        </article>
      }
    </div>
  </div>
</section>
