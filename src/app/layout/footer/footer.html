<!-- #8a9ac4 keeps >= 4.5:1 contrast on the dark ink background (WCAG AA) -->
<footer class="bg-ink text-[#8a9ac4]">
  <div class="mx-auto flex max-w-330 flex-wrap items-center justify-between gap-7 px-6 py-12 sm:px-9 lg:px-13">
    <div>
      <a routerLink="/" fragment="top" class="font-serif text-[1.3125rem] font-semibold tracking-tight text-[#eef1fb]">
        {{ profile.name }}<span class="text-[#6b96f5]">.</span>
      </a>
      <p class="mt-1 text-sm">{{ content().footer.role }}</p>
    </div>

    <ul class="flex flex-wrap gap-x-5 gap-y-2 font-mono text-xs">
      <li><a routerLink="/" fragment="leistungen" class="hover:text-white">{{ content().nav.services }}</a></li>
      <li><a routerLink="/" fragment="ablauf" class="hover:text-white">{{ content().nav.process }}</a></li>
      <li><a routerLink="/" fragment="referenzen" class="hover:text-white">{{ content().nav.work }}</a></li>
      <li><a routerLink="/" fragment="ueber-mich" class="hover:text-white">{{ content().nav.about }}</a></li>
    </ul>

    <div class="flex items-center gap-4 font-mono text-xs">
      <span>© {{ year }} {{ profile.name }}</span>
      <a routerLink="/impressum" class="hover:text-white">{{ content().footer.imprint }}</a>
      <a routerLink="/datenschutz" class="hover:text-white">{{ content().footer.privacy }}</a>
    </div>
  </div>
</footer>
